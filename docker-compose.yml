version: "2.2"

services:
  postgres:
    image: postgres:13-alpine
    container_name: siakad-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: siakad_local
      POSTGRES_USER: siakad
      POSTGRES_PASSWORD: siakad
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U siakad -d siakad_local"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: siakad-app
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - .env.local
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
    volumes:
      - ./:/var/www/html
    ports:
      - "8000:8000"
    working_dir: /var/www/html
    command: ["/usr/local/bin/start-app.sh"]

volumes:
  postgres-data:
